<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品开发进度 · 甘特图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f7f8f5;min-height:100vh;padding:20px 12px}
.header{max-width:1320px;margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:500;color:#1a1a1a}
.header .meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.header .meta .stat{font-size:12px;color:#888}
.stat b{color:#333}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:#777}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.dot-done{background:#4caf50}.dot-curr{background:#2196f3}.dot-pend{background:#e0e0e0}.dot-risk{background:#ff7043}

.container{max-width:1320px;margin:0 auto;background:#fff;border-radius:12px;border:0.5px solid #e8e8e8;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:0.5px solid #eee;background:#fafafa;flex-wrap:wrap}
.toolbar button{padding:5px 14px;border:0.5px solid #ddd;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#555;transition:all .12s}
.toolbar button:hover{background:#f0f0f0}
.toolbar button.active{background:#2196f3;color:#fff;border-color:#2196f3}
.now-time{font-size:11px;color:#999;margin-left:auto}

.wrap{overflow-x:auto}
.table{min-width:1100px;width:100%}
.head-row{display:flex;border-bottom:0.5px solid #eee;background:#fafafa;position:sticky;top:0;z-index:2}
.head-row .name-col{min-width:230px;width:230px;padding:8px 14px;font-size:12px;font-weight:500;color:#666;display:flex;align-items:flex-end;border-right:0.5px solid #eee;flex-shrink:0}
.head-row .tl-col{flex:1;display:flex;flex-direction:column}
.months{display:flex;border-bottom:0.5px solid #eee}
.months .m{text-align:center;font-size:11px;font-weight:500;color:#888;padding:6px 0;border-right:0.5px solid #f0f0f0}
.weeks{display:flex}
.weeks .w{text-align:center;font-size:9px;color:#bbb;padding:3px 0;border-right:0.5px solid #f5f5f5}
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:#ff5252;z-index:3;pointer-events:none}
.today-label{position:absolute;top:4px;left:-14px;font-size:9px;color:#ff5252;font-weight:500;white-space:nowrap}

.cat-row{display:flex;background:#f8f9fa;cursor:pointer;user-select:none;transition:background .12s}
.cat-row:hover{background:#f0f2f5}
.cat-row .name-col{min-width:230px;width:230px;padding:9px 14px;font-size:13px;font-weight:500;color:#444;display:flex;align-items:center;gap:8px;border-right:0.5px solid #eee;flex-shrink:0}
.cat-row .name-col .arrow{font-size:10px;transition:transform .2s;color:#aaa}
.cat-row .empty{flex:1;border-bottom:0.5px solid #eee}
.cat-count{font-size:10px;color:#aaa;font-weight:400;margin-left:auto}
.cat-row.collapsed .arrow{transform:rotate(-90deg)}

.prod-row{display:flex;border-bottom:0.5px solid #f5f5f5;transition:background .12s}
.prod-row:hover{background:#fafcfe}
.prod-row.hidden{display:none}
.prod-row .name-col{min-width:230px;width:230px;padding:6px 14px;display:flex;align-items:center;gap:8px;border-right:0.5px solid #eee;flex-shrin:0;font-size:12px;color:#333}
.prod-row .name-col .pn{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-row .name-col .person{font-size:10px;color:#aaa;flex-shrink:0}
.prod-row .risk-dot{width:6px;height:6px;border-radius:50%;background:#ff7043;flex-shrink:0}
.prod-row .bars-col{flex:1;position:relative;height:32px;display:flex;align-items:center}
.bar-stage{position:absolute;height:18px;border-radius:3px;top:7px;cursor:pointer;transition:transform .1s,box-shadow .1s}
.bar-stage:hover{transform:scaleY(1.15);box-shadow:0 1px 4px rgba(0,0,0,0.12);z-index:10}
.bar-done{background:#4caf50}.bar-curr{background:#2196f3}.bar-pend{background:#e8e8e8;border:0.5px dashed #ccc}
.bar-risk{background:#ff7043}

.popup{position:fixed;background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:10px 14px;font-size:12px;color:#333;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:100;pointer-events:none;opacity:0;transition:opacity .15s;max-width:220px}
.popup.show{opacity:1}
.popup .p-title{font-weight:500;margin-bottom:4px}
.popup .p-info{font-size:11px;color:#888}

.footer{max-width:1320px;margin:16px auto;text-align:center;font-size:11px;color:#bbb}
</style>

const startDate = new Date("2026-04-20");
const endDate = new Date("2026-10-05");
const totalDays = Math.ceil((endDate - startDate) / (1000*60*60*24));
const monthNames = ["5月","6月","7月","8月","9月"];
const monthDays = [31,30,31,31,30]; // May-Sep days

function dateToX(dateStr) {
  const d = new Date(dateStr);
  const days = Math.ceil((d - startDate) / (1000*60*60*24));
  return (days / totalDays) * 100;
}

function fmtDate(s) { return s.slice(5); }

const popup = document.getElementById("popup");

function showPopup(e, stage, product) {
  popup.innerHTML = `<div class="p-title">${product.name} · ${stage.s}</div><div class="p-info">${fmtDate(stage.st)} → ${fmtDate(stage.et)} · ${stage.status==="done"?"已完成":stage.status==="curr"?"进行中":"待开始"}</div>${product.riskNote ? '<div class="p-info" style="color:#ff7043;margin-top:3px">⚠ '+product.riskNote+'</div>':''}`;
  popup.className = "popup show";
  popup.style.left = (e.clientX+12)+"px";
  popup.style.top = (e.clientY-50)+"px";
}
function hidePopup(){popup.className="popup";}

function buildGantt(filter) {
  const wrap = document.getElementById("ganttWrap");
  let html = '<div class="table"><div class="head-row"><div class="name-col">产品</div><div class="tl-col">';
  html += '<div class="months">'+monthNames.map((m,i)=>'<div class="m" style="width:'+(monthDays[i]/totalDays*100)+'%">'+m+'</div>').join('')+'</div>';
  html += '</div></div>';

  const cats = ["相框","柜子","PET"];
  let idx = 0;
  cats.forEach(cat => {
    const catProds = products.filter(p => p.cat === cat);
    if (filter !== "all" && filter !== "risk" && cat !== filter) return;
    const visible = filter === "risk" ? catProds.filter(p=>p.risk) : catProds;
    if (visible.length === 0) return;
    const catId = "cat_"+idx;
    html += `<div class="cat-row" onclick="toggleCat('${catId}')" data-catid="${catId}">
      <div class="name-col"><span class="arrow">▼</span>${cat}<span class="cat-count">${visible.length}项</span></div>
      <div class="empty"></div>
    </div>`;
    visible.forEach((p,i)=>{
      const rowId = catId+"_r"+i;
      html += `<div class="prod-row" data-catid="${catId}" id="${rowId}">
        <div class="name-col" title="${p.name}${p.riskNote?' · '+p.riskNote:''}">
          <span class="pn">${p.sub?p.sub+"·":""}${p.name}</span>
          ${p.risk?'<span class="risk-dot" title="'+p.riskNote+'"></span>':''}
        </div>
        <div class="bars-col">`;
      p.stages.forEach(stg=>{
        const x = dateToX(stg.st);
        const w = dateToX(stg.et) - x;
        let cls = "bar-stage ";
        if(stg.status==="done") cls+="bar-done";
        else if(stg.status==="curr") cls+="bar-curr";
        else cls+="bar-pend";
        if(p.risk && stg.status==="pend") cls+=" bar-risk";
        html += `<div class="${cls}" style="left:${x}%;width:${Math.max(w,0.5)}%" title="${stg.s}: ${fmtDate(stg.st)}→${fmtDate(stg.et)}" data-stage="${stg.s}" onmouseenter="showPopup(event,${JSON.stringify(stg).replace(/"/g,'&quot;')},${JSON.stringify({name:p.name,riskNote:p.riskNote}).replace(/"/g,'&quot;')})" onmouseleave="hidePopup()">&nbsp;</div>`;
      });
      html += '</div></div>';
    });
    idx++;
  });
  wrap.innerHTML = html;
}

function toggleCat(catId) {
  const row = document.querySelector(`.cat-row[data-catid="${catId}"]`);
  row.classList.toggle("collapsed");
  document.querySelectorAll(`.prod-row[data-catid="${catId}"]`).forEach(r => r.classList.toggle("hidden"));
}

document.querySelectorAll(".toolbar button").forEach(btn => {
  btn.addEventListener("click", function(){
    document.querySelectorAll(".toolbar button").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
    buildGantt(this.dataset.filter);
  });
});

buildGantt("all");
