<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品开发进度 · 看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f7f8f5;min-height:100vh;padding:16px 10px}
.header{max-width:100%;margin:0 auto 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:500;color:#1a1a1a}
.header .info{font-size:12px;color:#888;display:flex;gap:16px}
.info b{color:#333}
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;min-height:70vh;align-items:flex-start}
.column{min-width:210px;max-width:240px;flex:1;background:#f2f3f0;border-radius:10px;padding:10px;display:flex;flex-direction:column}
.column.done{background:#eaf5ea}
.col-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 4px}
.col-head .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#4caf50}.dot-wip{background:#2196f3}.dot-todo{background:#bbb}
.col-head .name{font-size:13px;font-weight:500;color:#444}
.col-head .count{font-size:11px;color:#aaa;margin-left:auto}
.cards{display:flex;flex-direction:column;gap:6px;min-height:40px}
.card{background:#fff;border-radius:7px;padding:10px 12px;border:0.5px solid #e8e8e8;cursor:grab;transition:box-shadow .12s,transform .12s;user-select:none}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card:active{cursor:grabbing}
.card .r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.card .ct{font-size:11px;color:#999;font-weight:500}
.card .risk{font-size:9px;color:#ff7043;background:#fff3e0;padding:1px 5px;border-radius:3px}
.card .name{font-size:13px;font-weight:500;color:#222;margin-bottom:3px}
.card .r3{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#aaa}
.card .person{color:#888}
.card .date{font-size:9px;color:#bbb}
.card.dragging{opacity:0.5;transform:scale(0.96)}
.col-drop-zone{min-height:12px;border-radius:6px;transition:background .15s}
.col-drop-zone.over{background:rgba(33,150,243,0.08)}

.tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.tag-frame{background:#fff4eb;color:#c56a2e}
.tag-cab{background:#eaf4fa;color:#2c6e9c}
.tag-pet{background:#f3ecf9;color:#6b3fa0}

.summary{display:flex;gap:16px;margin:16px 0 0;flex-wrap:wrap;font-size:12px;color:#888}
.summary span{display:flex;align-items:center;gap:5px}
.summary .dot{width:8px;height:8px;border-radius:50%}
.footer{text-align:center;margin-top:14px;font-size:11px;color:#bbb}
</style>
</head>
<body>
<div class="header">
  <h1>产品开发进度 · 看板</h1>
  <div class="info"><b>13</b> 产品 · <b style="color:#4caf50">1</b> 已完成 · <b style="color:#2196f3">9</b> 进行中 · <b style="color:#ff7043">3</b> 风险</div>
</div>

<div class="kanban" id="kanban">
  <!-- FBA发货列 (已完成的放在这) -->
  <div class="column done" data-col="fba">
    <div class="col-head"><span class="dot dot-ok"></span><span class="name">FBA 已发货</span><span class="count" id="cnt-fba">0</span></div>
    <div class="cards" data-col="fba"></div>
  </div>
  <div class="column" data-col="qa">
    <div class="col-head"><span class="dot dot-wip"></span><span class="name">品质验货</span><span class="count" id="cnt-qa">0</span></div>
    <div class="cards" data-col="qa"></div>
  </div>
  <div class="column" data-col="sample">
    <div class="col-head"><span class="dot dot-wip"></span><span class="name">样品测试</span><span class="count" id="cnt-sample">0</span></div>
    <div class="cards" data-col="sample"></div>
  </div>
  <div class="column" data-col="supplier">
    <div class="col-head"><span class="dot dot-wip"></span><span class="name">供应商确认</span><span class="count" id="cnt-supplier">0</span></div>
    <div class="cards" data-col="supplier"></div>
  </div>
  <div class="column" data-col="design">
    <div class="col-head"><span class="dot dot-wip"></span><span class="name">设计打样</span><span class="count" id="cnt-design">0</span></div>
    <div class="cards" data-col="design"></div>
  </div>
  <div class="column" data-col="research">
    <div class="col-head"><span class="dot dot-wip"></span><span class="name">调研立项</span><span class="count" id="cnt-research">0</span></div>
    <div class="cards" data-col="research"></div>
  </div>
</div>
<div class="footer">拖拽卡片切换阶段 · 数据刷新即更新看板</div>

<script>
const stageOrder = ["research","design","supplier","sample","qa","fba"];
const stageNames = {research:"调研立项",design:"设计打样",supplier:"供应商确认",sample:"样品测试",qa:"品质验货",fba:"FBA已发货"};
const catTags = {"相框":'<span class="tag tag-frame">相框</span>',"柜子":'<span class="tag tag-cab">柜子</span>',"PET":'<span class="tag tag-pet">PET</span>'};

// Current stage mapping for each product
const cardData = [
  {id:"p1",cat:"相框",name:"悬浮框",person:"陈工",stage:"sample",date:"6.25",risk:false},
  {id:"p2",cat:"相框",name:"球衣框",person:"陈工",stage:"design",date:"6.25",risk:true,riskNote:"授权谈判"},
  {id:"p3",cat:"相框",name:"复古照片墙",person:"林工",stage:"sample",date:"6.28",risk:true,riskNote:"做旧良率75%"},
  {id:"p4",cat:"相框",name:"装饰照片墙",person:"王工",stage:"design",date:"6.25",risk:false},
  {id:"p5",cat:"相框",name:"密度板线条",person:"赵工",stage:"qa",date:"6.30",risk:false},
  {id:"p6",cat:"相框",name:"发泡线条",person:"赵工",stage:"fba",date:"已完成",risk:false},
  {id:"p7",cat:"相框",name:"实木线条",person:"赵工",stage:"design",date:"6.25",risk:true,riskNote:"供应商未定"},
  {id:"p8",cat:"相框",name:"树脂相框",person:"王工",stage:"research",date:"6.25",risk:true,riskNote:"模具费"},
  {id:"p9",cat:"柜子",name:"书柜",person:"张工",stage:"supplier",date:"6.25",risk:false},
  {id:"p10",cat:"柜子",name:"置物架",person:"张工",stage:"design",date:"6.25",risk:true,riskNote:"BOM超预算"},
  {id:"p11",cat:"柜子",name:"床头柜",person:"张工",stage:"sample",date:"6.28",risk:false},
  {id:"p12",cat:"柜子",name:"雕刻板",person:"王工",stage:"design",date:"6.22",risk:true,riskNote:"版权确认"},
  {id:"p13",cat:"PET",name:"小收纳盒",person:"刘工",stage:"design",date:"6.25",risk:true,riskNote:"双重谈判"}
];

function renderCards() {
  stageOrder.forEach(stage => {
    const container = document.querySelector(`.cards[data-col="${stage}"]`);
    container.innerHTML = "";
    const items = cardData.filter(c => c.stage === stage);
    document.getElementById("cnt-"+stage).textContent = items.length;
    items.forEach(c => {
      const card = document.createElement("div");
      card.className = "card";
      card.draggable = true;
      card.dataset.id = c.id;
      card.dataset.stage = c.stage;
      card.ondragstart = e => { e.dataTransfer.setData("text/plain",c.id); card.classList.add("dragging"); };
      card.ondragend = () => card.classList.remove("dragging");
      card.innerHTML = `<div class="r1">${catTags[c.cat]}${c.risk?`<span class="risk" title="${c.riskNote}">⚠${c.riskNote}</span>`:''}</div>
        <div class="name">${c.name}</div>
        <div class="r3"><span class="person">${c.person}</span><span class="date">${c.date}</span></div>`;
      container.appendChild(card);
    });
  });
}

// Drop zones
document.querySelectorAll(".cards").forEach(col => {
  col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("over"); });
  col.addEventListener("dragleave", () => col.classList.remove("over"));
  col.addEventListener("drop", e => {
    e.preventDefault();
    col.classList.remove("over");
    const id = e.dataTransfer.getData("text/plain");
    const targetStage = col.dataset.col;
    const item = cardData.find(c => c.id === id);
    if (item && item.stage !== targetStage) {
      item.stage = targetStage;
      renderCards();
    }
  });
});

renderCards();
</script>
</body>
</html>
