<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品开发组员进度面板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
h1{text-align:center;font-size:24px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#818cf8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;font-size:12px;color:#64748b;margin-bottom:24px}

/* 概览卡片 */
.overview{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.ov-card{background:#1e293b;border-radius:16px;padding:20px;text-align:center;border:1px solid #334155;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.ov-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ov-card:nth-child(1)::before{background:linear-gradient(90deg,#f97316,#fb923c)}
.ov-card:nth-child(2)::before{background:linear-gradient(90deg,#22d3ee,#38bdf8)}
.ov-card:nth-child(3)::before{background:linear-gradient(90deg,#a78bfa,#c084fc)}
.ov-card:nth-child(4)::before{background:linear-gradient(90deg,#34d399,#6ee7b7)}
.ov-card:hover{transform:translateY(-2px);border-color:#475569}
.ov-name{font-size:22px;font-weight:800;margin-bottom:8px}
.ov-card:nth-child(1) .ov-name{color:#fb923c}
.ov-card:nth-child(2) .ov-name{color:#38bdf8}
.ov-card:nth-child(3) .ov-name{color:#c084fc}
.ov-card:nth-child(4) .ov-name{color:#6ee7b7}
.ov-stats{display:flex;justify-content:center;gap:20px;font-size:13px;color:#94a3b8}
.ov-stats span{display:flex;flex-direction:column;align-items:center}
.ov-stats b{font-size:20px;font-weight:700;line-height:1.2}
.ov-card:nth-child(1) .ov-stats b{color:#fb923c}
.ov-card:nth-child(2) .ov-stats b{color:#38bdf8}
.ov-card:nth-child(3) .ov-stats b{color:#c084fc}
.ov-card:nth-child(4) .ov-stats b{color:#6ee7b7}

/* 整体进度条 */
.ov-bar-wrap{margin-top:12px;background:#334155;border-radius:10px;height:6px;overflow:hidden}
.ov-bar{height:100%;border-radius:10px;transition:width .4s}
.ov-card:nth-child(1) .ov-bar{background:linear-gradient(90deg,#f97316,#fb923c)}
.ov-card:nth-child(2) .ov-bar{background:linear-gradient(90deg,#22d3ee,#38bdf8)}
.ov-card:nth-child(3) .ov-bar{background:linear-gradient(90deg,#a78bfa,#c084fc)}
.ov-card:nth-child(4) .ov-bar{background:linear-gradient(90deg,#34d399,#6ee7b7)}
.ov-pct{font-size:11px;color:#64748b;margin-top:4px}

/* 详细面板 */
.detail-section{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.col-card{background:#1e293b;border-radius:16px;border:1px solid #334155;overflow:hidden}
.col-header{padding:16px 20px;font-size:17px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.col-header .badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.col-card:nth-child(1) .col-header{background:linear-gradient(135deg,rgba(249,115,22,.15),transparent)}
.col-card:nth-child(1) .badge{background:rgba(249,115,22,.2);color:#fb923c}
.col-card:nth-child(2) .col-header{background:linear-gradient(135deg,rgba(34,211,238,.15),transparent)}
.col-card:nth-child(2) .badge{background:rgba(34,211,238,.2);color:#38bdf8}
.col-card:nth-child(3) .col-header{background:linear-gradient(135deg,rgba(167,139,250,.15),transparent)}
.col-card:nth-child(3) .badge{background:rgba(167,139,250,.2);color:#c084fc}
.col-card:nth-child(4) .col-header{background:linear-gradient(135deg,rgba(52,211,153,.15),transparent)}
.col-card:nth-child(4) .badge{background:rgba(52,211,153,.2);color:#6ee7b7}

.col-body{padding:12px 16px 16px}

/* 产品卡 */
.prod-card{background:#0f172a;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1e293b;transition:all .15s}
.prod-card:hover{border-color:#475569}
.prod-card:last-child{margin-bottom:0}
.prod-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prod-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%}
.prod-batch-num{font-size:11px;color:#64748b}
.prod-stages{display:flex;align-items:center;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.stage-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;position:relative;flex-shrink:0}
.stage-dot:hover{transform:scale(1.15);z-index:2}
.stage-dot.done{background:#22c55e;color:#fff}
.stage-dot.curr{background:#f59e0b;color:#fff;animation:pulse 2s infinite}
.stage-dot.pend{background:#334155;color:#64748b}
.stage-dot.overdue{background:#ef4444;color:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 6px rgba(245,158,11,0)}}
.stage-connector{width:12px;height:2px;background:#334155;flex-shrink:0}
.stage-connector.done{background:#22c55e}
.prod-bar-wrap{background:#334155;border-radius:6px;height:5px;overflow:hidden;margin-bottom:6px}
.prod-bar{height:100%;border-radius:6px;transition:width .4s}
.prod-bar.good{background:linear-gradient(90deg,#22c55e,#4ade80)}
.prod-bar.mid{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.prod-bar.bad{background:linear-gradient(90deg,#ef4444,#f87171)}
.prod-meta{display:flex;justify-content:space-between;font-size:10px;color:#64748b}
.prod-meta span{color:#94a3b8}
.stage-tooltip{display:none;position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;font-size:10px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;border:1px solid #334155;font-weight:400}
.stage-dot:hover .stage-tooltip{display:block}

/* 添加按钮 */
.add-prod-btn{width:100%;padding:10px;border:2px dashed #334155;border-radius:10px;background:transparent;color:#64748b;font-size:13px;cursor:pointer;transition:all .15s;margin-top:4px}
.add-prod-btn:hover{border-color:#475569;color:#94a3b8}

/* 弹窗 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
.overlay.show{display:flex}
.panel{background:#1e293b;border-radius:16px;padding:28px;width:420px;max-width:90vw;border:1px solid #334155;max-height:85vh;overflow-y:auto}
.panel h3{font-size:16px;margin-bottom:16px}
.panel label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px;margin-top:12px}
.panel label:first-child{margin-top:0}
.panel input,.panel select{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:13px;outline:none}
.panel input:focus,.panel select:focus{border-color:#818cf8}
.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn{padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#818cf8;color:#fff}
.btn-primary:hover{background:#6366f1}
.btn-cancel{background:#334155;color:#94a3b8}
.btn-cancel:hover{background:#475569}
.btn-danger{background:transparent;color:#f87171;border:1px solid #f87171}
.btn-danger:hover{background:rgba(248,113,113,.1)}
.btn-sm{padding:4px 10px;font-size:11px}

/* 阶段复选框 */
.stage-checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.stage-chk{padding:4px 10px;border-radius:6px;font-size:11px;background:#334155;color:#94a3b8;cursor:pointer;transition:all .15s;border:1px solid transparent;user-select:none}
.stage-chk.on{background:rgba(34,197,94,.15);color:#22c55e;border-color:#22c55e}
.stage-chk.curr-on{background:rgba(245,158,11,.15);color:#f59e0b;border-color:#f59e0b}

/* 操作栏 */
.toolbar{display:flex;justify-content:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.toolbar .btn{font-size:13px;padding:10px 24px}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:12px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.3);border:1px solid #334155}
.toast.show{opacity:1}

/* 响应式 */
@media(max-width:1200px){.overview,.detail-section{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.overview,.detail-section{grid-template-columns:1fr}}

/* 无产品占位 */
.empty-hint{text-align:center;padding:30px 10px;color:#475569;font-size:12px}

/* 批次展开 */
.batch-list{margin-top:8px;border-top:1px solid #1e293b;padding-top:8px;display:none}
.batch-list.open{display:block}
.batch-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;cursor:pointer;border-radius:6px;padding:4px 8px;margin:2px 0;transition:all .1s}
.batch-row:hover{background:rgba(129,140,248,.08)}
.batch-row .b-name{flex:1;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.batch-row .b-pct{font-weight:600;font-size:13px;width:40px;text-align:right}
.batch-row .b-pct.done-c{color:#22c55e}
.batch-row .b-pct.curr-c{color:#f59e0b}
.batch-row .b-pct.pend-c{color:#64748b}
.toggle-batches{font-size:10px;color:#64748b;cursor:pointer;margin-top:4px;user-select:none}
.toggle-batches:hover{color:#94a3b8}
</style>
</head>
<body>

<h1>产品开发组员进度面板</h1>
<div class="subtitle">7 阶段流程：调研立项 → 设计打样 → 供应商确认 → 样品测试 → 大货生产 → 品质验货 → FBA发货</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="addProductFor()">＋ 添加产品</button>
  <button class="btn" style="background:#334155;color:#94a3b8" onclick="exportData()">📥 导出数据</button>
  <button class="btn" style="background:#334155;color:#94a3b8" onclick="importData()">📤 导入数据</button>
  <button class="btn btn-cancel" onclick="resetData()">🔄 重置示例</button>
</div>

<div id="overview"></div>
<div id="detail" class="detail-section"></div>

<div class="toast" id="toast"></div>

<div class="overlay" id="panelOverlay" onclick="if(event.target===this)closePanel()">
  <div class="panel" id="panelContent"></div>
</div>

<script>
const STAGES = ['调研立项','设计打样','供应商确认','样品测试','大货生产','品质验货','FBA发货'];
const PERSONS = [
  {id:'fan',name:'范工',color:'#fb923c',bar:'#f97316'},
  {id:'wang',name:'汪工',color:'#38bdf8',bar:'#22d3ee'},
  {id:'li',name:'李工',color:'#c084fc',bar:'#a78bfa'},
  {id:'wu',name:'吴工',color:'#6ee7b7',bar:'#34d399'}
];

const STORAGE_KEY = 'team_progress_data';

const DEMO_DATA = [
  {id:1,person:'fan',name:'磁吸相框',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-05-'+(10+i*8));const e=new Date('2026-05-'+(18+i*8));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<4?'done':i===4?'curr':'pend'}
    })},
    {bid:2,name:'第2批（新款）',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-06-'+(5+i*7));const e=new Date('2026-06-'+(14+i*7));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<2?'done':i===2?'curr':'pend'}
    })}
  ]},
  {id:2,person:'fan',name:'亚克力展示盒',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-05-'+(15+i*6));const e=new Date('2026-05-'+(23+i*6));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<3?'done':i===3?'curr':'pend'}
    })}
  ]},
  {id:3,person:'wang',name:'玻璃花瓶',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-05-'+(8+i*9));const e=new Date('2026-05-'+(18+i*9));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<1?'done':i===1?'curr':'pend'}
    })}
  ]},
  {id:4,person:'wang',name:'陶瓷摆件',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-06-'+(1+i*8));const e=new Date('2026-06-'+(10+i*8));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i===0?'done':i===1?'curr':'pend'}
    })},
    {bid:2,name:'第2批（定制款）',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-06-'+(15+i*7));const e=new Date('2026-06-'+(24+i*7));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i===0?'curr':'pend'}
    })}
  ]},
  {id:5,person:'wang',name:'树脂托盘',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-06-'+(10+i*7));const e=new Date('2026-06-'+(20+i*7));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:'pend'}
    })}
  ]},
  {id:6,person:'li',name:'收纳柜',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-04-'+(20+i*10));const e=new Date('2026-05-'+(2+i*10));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<5?'done':i===5?'curr':'pend'}
    })}
  ]},
  {id:7,person:'li',name:'多层置物架',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-05-'+(20+i*7));const e=new Date('2026-05-'+(30+i*7));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<2?'done':i===2?'curr':'pend'}
    })},
    {bid:2,name:'第2批（大尺寸）',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-06-'+(10+i*8));const e=new Date('2026-06-'+(20+i*8));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:'pend'}
    })}
  ]},
  {id:8,person:'wu',name:'墙贴挂饰',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-05-'+(5+i*8));const e=new Date('2026-05-'+(15+i*8));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<4?'done':i===4?'curr':'pend'}
    })}
  ]},
  {id:9,person:'wu',name:'桌面收纳',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-05-'+(25+i*7));const e=new Date('2026-06-'+(5+i*7));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i<2?'done':i===2?'curr':'pend'}
    })},
    {bid:2,name:'第2批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-06-'+(20+i*8));const e=new Date('2026-06-'+(30+i*8));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:'pend'}
    })}
  ]},
  {id:10,person:'wu',name:'挂钩收纳',batches:[
    {bid:1,name:'第1批',stages:STAGES.map((s,i)=>{
      const d=new Date('2026-06-'+(1+i*6));const e=new Date('2026-06-'+(10+i*6));
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i===0?'done':i===1?'curr':'pend'}
    })}
  ]}
];

let products = [];
let nextId = 1;
let editTarget = null; // {personId, productId}

function loadData(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d){const p=JSON.parse(d);if(p.length>0)return p}}catch(e){}
  return JSON.parse(JSON.stringify(DEMO_DATA));
}

function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(products))}catch(e){}}

function init(){
  products = loadData();
  nextId = Math.max(...products.map(p=>p.id),0)+1;
  render();
}
init();

/* ========== 工具函数 ========== */
function personById(pid){return PERSONS.find(p=>p.id===pid)}
function batchProgress(b){if(!b.stages||b.stages.length===0)return 0;const done=b.stages.filter(s=>s.status==='done').length;return Math.round(done/b.stages.length*100)}
function batchCurrStage(b){return b.stages?b.stages.find(s=>s.status==='curr'):null}
function personOverall(personId){
  const prods=products.filter(p=>p.person===personId);
  if(prods.length===0)return 0;
  let totalStages=0,doneStages=0;
  prods.forEach(p=>{p.batches.forEach(b=>{b.stages.forEach(s=>{totalStages++;if(s.status==='done')doneStages++})})});
  return totalStages>0?Math.round(doneStages/totalStages*100):0;
}
function personStats(personId){
  const prods=products.filter(p=>p.person===personId);
  let doneBatches=0,activeBatches=0,pendBatches=0;
  prods.forEach(p=>{p.batches.forEach(b=>{const pct=batchProgress(b);if(pct===100)doneBatches++;else if(pct>0)activeBatches++;else pendBatches++})});
  return {products:prods.length,batches:doneBatches+activeBatches+pendBatches,doneBatches,activeBatches,pendBatches};
}
function stageClass(s){
  const today=new Date().toISOString().slice(0,10);
  if(s.status==='done')return 'done';
  if(s.status==='curr')return s.et<today?'overdue':'curr';
  return s.et<today?'overdue':'pend';
}

/* ========== 渲染 ========== */
function render(){
  renderOverview();
  renderDetail();
}

function renderOverview(){
  const el=document.getElementById('overview');
  el.innerHTML=PERSONS.map(p=>{
    const stats=personStats(p.id);
    const pct=personOverall(p.id);
    return '<div class="ov-card" onclick="scrollToPerson(\''+p.id+'\')">'
      +'<div class="ov-name">'+p.name+'</div>'
      +'<div class="ov-stats">'
        +'<span><b>'+stats.products+'</b>产品</span>'
        +'<span><b>'+stats.activeBatches+'</b>进行中</span>'
        +'<span><b>'+stats.doneBatches+'</b>已完成</span>'
      +'</div>'
      +'<div class="ov-bar-wrap"><div class="ov-bar" style="width:'+pct+'%"></div></div>'
      +'<div class="ov-pct">总体进度 '+pct+'%</div>'
    +'</div>';
  }).join('');
}

function renderDetail(){
  const el=document.getElementById('detail');
  el.innerHTML=PERSONS.map(p=>{
    const prods=products.filter(x=>x.person===p.id);
    return '<div class="col-card" id="col-'+p.id+'">'
      +'<div class="col-header">'+p.name+'<span class="badge">'+prods.length+'个产品</span></div>'
      +'<div class="col-body">'
        +(prods.length===0
          ?'<div class="empty-hint">暂无产品</div>'
          :prods.map(prod=>renderProdCard(prod,p)).join(''))
        +'<button class="add-prod-btn" onclick="showAddPanel(\''+p.id+'\')">＋ 添加产品</button>'
      +'</div>'
    +'</div>';
  }).join('');
}

function renderProdCard(prod,p){
  const batches=prod.batches||[];
  const mainBatch=batches[0]||null;
  const pct=batches.length>0?Math.round(batches.reduce((a,b)=>a+batchProgress(b),0)/batches.length):0;
  const barClass=pct===100?'good':pct>30?'mid':'bad';

  let stagesHtml='';
  if(mainBatch&&mainBatch.stages){
    stagesHtml='<div class="prod-stages">'+mainBatch.stages.map((s,i)=>{
      const cls=stageClass(s);
      const initials=s.s.replace(/[品发应大调F供]/g,'').slice(0,2);
      return (i>0?'<div class="stage-connector'+(cls==='done'?' done':'')+'"></div>':'')
        +'<div class="stage-dot '+cls+'" onclick="advanceStage('+prod.id+','+mainBatch.bid+','+i+')" title="'+s.s+' '+s.st+'~'+s.et+'">'
        +initials+'<div class="stage-tooltip">'+s.s+'<br>'+s.st+'~'+s.et+'</div></div>';
    }).join('')+'</div>';
  }

  let batchesList='';
  if(batches.length>1){
    batchesList='<div class="batch-list" id="blist-'+prod.id+'">'
      +batches.map(b=>{
        const bp=batchProgress(b);
        const cls=bp===100?'done-c':bp>0?'curr-c':'pend-c';
        return '<div class="batch-row" onclick="advanceBatchStage('+prod.id+','+b.bid+')">'
          +'<span class="b-name">'+b.name+'</span>'
          +'<span class="b-pct '+cls+'">'+bp+'%</span>'
        +'</div>';
      }).join('')
    +'</div>'
    +'<div class="toggle-batches" onclick="toggleBatches('+prod.id+')">▼ 展开所有批次（'+batches.length+'个）</div>';
  }

  return '<div class="prod-card">'
    +'<div class="prod-hd">'
      +'<span class="prod-name" title="'+prod.name+'">'+prod.name+'</span>'
      +'<span class="prod-batch-num">'+batches.length+'批次</span>'
      +'<button class="btn btn-sm btn-danger" onclick="delProd('+prod.id+')" title="删除">✕</button>'
    +'</div>'
    +(stagesHtml||'')
    +'<div class="prod-bar-wrap"><div class="prod-bar '+barClass+'" style="width:'+pct+'%"></div></div>'
    +'<div class="prod-meta"><span>'+pct+'% 完成</span><span>'+(batchCurrStage(mainBatch)?batchCurrStage(mainBatch).s:'')+'</span></div>'
    +batchesList
  +'</div>';
}

function scrollToPerson(pid){
  const el=document.getElementById('col-'+pid);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

function toggleBatches(pid){
  const el=document.getElementById('blist-'+pid);
  if(el)el.classList.toggle('open');
}

/* ========== 阶段推进 ========== */
function advanceStage(productId,batchId,stageIdx){
  const prod=products.find(p=>p.id===productId);
  if(!prod)return;
  const batch=prod.batches.find(b=>b.bid===batchId);
  if(!batch||!batch.stages)return;
  const stage=batch.stages[stageIdx];
  // 循环：done → curr → pend → done
  if(stage.status==='done'){stage.status='pend'}
  else if(stage.status==='curr'){stage.status='done'}
  else{stage.status='curr'}
  // 将之前的标记为done，之后的标记为pend（确保只有一个curr）
  let foundCurr=false;
  for(let i=0;i<batch.stages.length;i++){
    if(batch.stages[i].status==='curr'){
      if(foundCurr){batch.stages[i].status='pend'}
      else foundCurr=true;
    }
  }
  saveData();render();
}

function advanceBatchStage(productId,batchId){
  const prod=products.find(p=>p.id===productId);
  if(!prod)return;
  const batch=prod.batches.find(b=>b.bid===batchId);
  if(!batch||!batch.stages)return;
  // 找到第一个非done的阶段推进
  let advanced=false;
  for(let i=0;i<batch.stages.length;i++){
    if(batch.stages[i].status==='curr'){batch.stages[i].status='done';advanced=true;}
    else if(batch.stages[i].status==='pend'&&!advanced){batch.stages[i].status='curr';advanced=true;break;}
  }
  if(!advanced){
    // 全部done，重置第一个为curr
    batch.stages.forEach(s=>s.status='pend');
    batch.stages[0].status='curr';
  }
  // 确保只有一个curr
  let foundCurr=false;
  batch.stages.forEach(s=>{if(s.status==='curr'){if(foundCurr)s.status='pend';else foundCurr=true}});
  saveData();render();
}

/* ========== 弹窗 ========== */
function showAddPanel(personId){
  editTarget = {personId,productId:null};
  const p=personById(personId);
  document.getElementById('panelContent').innerHTML=''
    +'<h3>添加产品 — '+p.name+'</h3>'
    +'<label>产品名称</label><input id="pnInput" placeholder="输入产品名称">'
    +'<label>批次数</label><select id="pnBatches"><option value="1">1个批次</option><option value="2">2个批次</option><option value="3">3个批次</option></select>'
    +'<div class="btn-row">'
      +'<button class="btn btn-cancel" onclick="closePanel()">取消</button>'
      +'<button class="btn btn-primary" onclick="doAddProduct()">确认添加</button>'
    +'</div>';
  openPanel();
  setTimeout(()=>document.getElementById('pnInput').focus(),150);
}

function doAddProduct(){
  const name=document.getElementById('pnInput').value.trim();
  if(!name){toast('请输入产品名称');return}
  const batchCount=parseInt(document.getElementById('pnBatches').value);
  const today=new Date().toISOString().slice(0,10);
  const batches=[];
  for(let j=1;j<=batchCount;j++){
    const stages=STAGES.map((s,i)=>{
      const d=new Date();d.setDate(d.getDate()+i*7);
      const e=new Date();e.setDate(e.getDate()+i*7+8);
      return {s,st:d.toISOString().slice(0,10),et:e.toISOString().slice(0,10),status:i===0?'curr':'pend'};
    });
    batches.push({bid:Math.max(...products.flatMap(p=>p.batches.map(b=>b.bid)),0)+j,name:'第'+j+'批',stages});
  }
  products.push({id:nextId++,person:editTarget.personId,name,batches});
  saveData();closePanel();render();
  toast('✓ 已添加：'+name);
}

function delProd(pid){
  const prod=products.find(p=>p.id===pid);
  if(!confirm('确认删除「'+prod.name+'」？'))return;
  products=products.filter(p=>p.id!==pid);
  saveData();render();toast('已删除');
}

function addProductFor(){
  // 弹出选择人员的简单弹窗
  document.getElementById('panelContent').innerHTML=''
    +'<h3>选择组员</h3>'
    +PERSONS.map(p=>'<button class="btn" style="width:100%;margin-bottom:8px;background:#1e293b;color:'+p.color+';border:1px solid #334155;font-size:16px;padding:14px;border-radius:10px;cursor:pointer" onclick="showAddPanel(\''+p.id+'\')">'+p.name+'</button>').join('')
    +'<div class="btn-row"><button class="btn btn-cancel" onclick="closePanel()">取消</button></div>';
  openPanel();
}

/* ========== 导入导出 ========== */
function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(products,null,2));
  a.download='组员进度_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('数据已导出');
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=()=>{
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const d=JSON.parse(reader.result);
        if(!Array.isArray(d))throw new Error();
        products=d;nextId=Math.max(...d.map(p=>p.id),0)+1;
        saveData();render();toast('✓ 导入成功，共'+d.length+'项');
      }catch(e){toast('导入失败：文件格式有误')}
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetData(){
  if(!confirm('确认重置为示例数据？当前数据将丢失！'))return;
  products=JSON.parse(JSON.stringify(DEMO_DATA));
  nextId=Math.max(...products.map(p=>p.id),0)+1;
  saveData();render();toast('已重置为示例数据');
}

/* ========== 面板控制 ========== */
function openPanel(){document.getElementById('panelOverlay').classList.add('show')}
function closePanel(){document.getElementById('panelOverlay').classList.remove('show');editTarget=null}

/* ========== Toast ========== */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
</script>
