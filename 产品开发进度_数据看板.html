<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品开发进度 · 数据看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f7f8f5;min-height:100vh;padding:20px 16px}
.header{max-width:1200px;margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:500;color:#1a1a1a}
.header .time{font-size:12px;color:#999}
.main{max-width:1200px;margin:0 auto}

/* KPI row */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:10px;padding:16px 18px;border:0.5px solid #eee}
.kpi .label{font-size:12px;color:#888;margin-bottom:6px}
.kpi .value{font-size:28px;font-weight:500}
.kpi .sub{font-size:11px;color:#aaa;margin-top:4px}
.v-green{color:#2e7d32}.v-blue{color:#1565c0}.v-orange{color:#e65100}.v-red{color:#bf360c}

/* Charts row */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.chart-box{background:#fff;border-radius:10px;padding:16px 18px;border:0.5px solid #eee}
.chart-box h3{font-size:13px;font-weight:500;color:#555;margin-bottom:10px}
.chart-box .cwrap{position:relative;height:240px}
.chart-box canvas{width:100%!important;height:100%!important}

/* Full-width risk+progress */
.bottom{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{background:#fff;border-radius:10px;padding:16px 18px;border:0.5px solid #eee}
.panel h3{font-size:13px;font-weight:500;color:#555;margin-bottom:12px}

/* Risk list */
.risk-list{display:flex;flex-direction:column;gap:8px}
.risk-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fffbf5;border-radius:7px;border:0.5px solid #fde8d0}
.risk-item.severe{background:#fff5f5;border-color:#fdd}
.risk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.risk-dot.hi{background:#e53935}.risk-dot.mi{background:#ff9800}
.risk-info{flex:1;font-size:12px;color:#555;line-height:1.5}
.risk-info .ri-name{font-weight:500;color:#333}
.risk-info .ri-note{font-size:11px;color:#888}

/* Progress bars */
.prog-list{display:flex;flex-direction:column;gap:10px}
.prog-item{display:flex;align-items:center;gap:12px}
.prog-label{font-size:12px;color:#555;width:80px;text-align:right;flex-shrink:0}
.prog-bar-wrap{flex:1;height:20px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex}
.prog-bar-seg{height:100%;transition:width .3s}
.prog-pct{font-size:11px;color:#888;width:36px;text-align:right;flex-shrink:0}

.legend-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:#888}
.legend-row span{display:flex;align-items:center;gap:4px}
.legend-row .dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

.footer{text-align:center;margin-top:16px;font-size:11px;color:#ccc}
</style>
</head>
<body>

<div class="header">
  <h1>产品开发进度 · 数据看板</h1>
  <span class="time">2026年6月 · 截至6月22日</span>
</div>

<div class="main">

<div class="kpi-grid">
  <div class="kpi"><div class="label">总产品数</div><div class="value">13</div><div class="sub">3大品类覆盖</div></div>
  <div class="kpi"><div class="label">已完成 / FBA</div><div class="value v-green">1</div><div class="sub">发泡线条 · 6.18已发</div></div>
  <div class="kpi"><div class="label">进行中</div><div class="value v-blue">9</div><div class="sub">3项样品测试 · 1项验货 · 5项设计/调研</div></div>
  <div class="kpi"><div class="label">风险项</div><div class="value v-orange">6</div><div class="sub">3项高风险需本周决策</div></div>
</div>

<div class="charts">
  <div class="chart-box">
    <h3>各品类进度分布</h3>
    <div class="cwrap"><canvas id="chartCat" role="img" aria-label="品类进度堆叠柱状图">各品类进度分布</canvas></div>
  </div>
  <div class="chart-box">
    <h3>整体阶段分布</h3>
    <div class="cwrap"><canvas id="chartStage" role="img" aria-label="阶段分布饼图">整体阶段分布</canvas></div>
  </div>
</div>

<div class="bottom">
  <div class="panel">
    <h3>风险清单</h3>
    <div class="risk-list" id="riskList"></div>
  </div>
  <div class="panel">
    <h3>各品类完成率</h3>
    <div class="prog-list" id="progList"></div>
    <div class="legend-row">
      <span><span class="dot" style="background:#4caf50"></span>已完成</span>
      <span><span class="dot" style="background:#2196f3"></span>进行中</span>
      <span><span class="dot" style="background:#e0e0e0"></span>待开始</span>
    </div>
  </div>
</div>

</div>
<div class="footer">数据看板 · 支持每日刷新</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const stageLabels = ["调研立项","设计打样","供应商确认","样品测试","大货生产","品质验货","FBA发货"];
const products = [
  {cat:"相框",name:"悬浮框",stages:[1,1,1,2,0,0,0],risk:0},
  {cat:"相框",name:"球衣框",stages:[1,2,0,0,0,0,0],risk:1},
  {cat:"相框",name:"复古照片墙",stages:[1,1,1,2,0,0,0],risk:1},
  {cat:"相框",name:"装饰照片墙",stages:[1,2,0,0,0,0,0],risk:0},
  {cat:"相框",name:"密度板线条",stages:[1,1,1,1,1,2,0],risk:0},
  {cat:"相框",name:"发泡线条",stages:[1,1,1,1,1,1,1],risk:0},
  {cat:"相框",name:"实木线条",stages:[1,2,0,0,0,0,0],risk:2},
  {cat:"相框",name:"树脂相框",stages:[2,0,0,0,0,0,0],risk:1},
  {cat:"柜子",name:"书柜",stages:[1,1,2,0,0,0,0],risk:0},
  {cat:"柜子",name:"置物架",stages:[1,2,0,0,0,0,0],risk:1},
  {cat:"柜子",name:"床头柜",stages:[1,1,1,2,0,0,0],risk:0},
  {cat:"柜子",name:"雕刻板",stages:[1,2,0,0,0,0,0],risk:1},
  {cat:"PET",name:"小收纳盒",stages:[1,2,0,0,0,0,0],risk:1}
];

// Chart 1: Category progress distribution
const cats = ["相框","柜子","PET"];
const doneCounts = cats.map(c=>products.filter(p=>p.cat===c).reduce((s,p)=>s+p.stages.filter(x=>x===1).length,0));
const currCounts = cats.map(c=>products.filter(p=>p.cat===c).reduce((s,p)=>s+p.stages.filter(x=>x===2).length,0));
const pendCounts = cats.map(c=>products.filter(p=>p.cat===c).reduce((s,p)=>s+p.stages.filter(x=>x===0).length,0));

new Chart(document.getElementById("chartCat"),{
  type:"bar",
  data:{labels:cats,datasets:[
    {label:"已完成",data:doneCounts,backgroundColor:"#4caf50",borderRadius:4},
    {label:"进行中",data:currCounts,backgroundColor:"#2196f3",borderRadius:4},
    {label:"待开始",data:pendCounts,backgroundColor:"#e0e0e0",borderRadius:4}
  ]},
  options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,ticks:{stepSize:5}}},plugins:{legend:{display:false}}}
});

// Chart 2: Stage distribution
const stageData = stageLabels.map((_,i)=>products.filter(p=>p.stages[i]===1).length);
new Chart(document.getElementById("chartStage"),{
  type:"doughnut",
  data:{labels:["FBA已发货","品质验货","样品测试","供应商确认","设计打样","调研立项"],datasets:[{
    data:[1,1,3,1,6,1],backgroundColor:["#4caf50","#81c784","#2196f3","#64b5f6","#64b5f6","#90caf9"]
  }]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{boxWidth:10,font:{size:11}}}}}
});

// Risk list
const risks = [
  {name:"实木线条",note:"供应商未定，3家比价中，6.30取舍",severe:true},
  {name:"球衣框",note:"NBA联名授权谈判周期不可控",severe:false},
  {name:"置物架",note:"承重结构设计可能推高BOM成本15%",severe:false},
  {name:"雕刻板",note:"激光雕刻图案版权待确认",severe:false},
  {name:"树脂相框",note:"新品类模具费需单独评估",severe:false},
  {name:"小收纳盒",note:"PET原料价+模具费双重谈判中",severe:false}
];
document.getElementById("riskList").innerHTML = risks.map(r=>`<div class="risk-item${r.severe?' severe':''}">
  <span class="risk-dot${r.severe?' hi':' mi'}"></span>
  <div class="risk-info"><span class="ri-name">${r.name}</span> · <span class="ri-note">${r.note}</span></div>
</div>`).join("");

// Progress bars
const catProgs = cats.map(c=>{
  const prods = products.filter(p=>p.cat===c);
  const total = prods.length * 7;
  const done = prods.reduce((s,p)=>s+p.stages.filter(x=>x===1).length,0);
  const curr = prods.reduce((s,p)=>s+p.stages.filter(x=>x===2).length,0);
  return {cat:c,done,curr,total};
});
document.getElementById("progList").innerHTML = catProgs.map(p=>`
  <div class="prog-item">
    <span class="prog-label">${p.cat}</span>
    <div class="prog-bar-wrap">
      <div class="prog-bar-seg" style="width:${(p.done/p.total*100).toFixed(0)}%;background:#4caf50"></div>
      <div class="prog-bar-seg" style="width:${(p.curr/p.total*100).toFixed(0)}%;background:#2196f3"></div>
    </div>
    <span class="prog-pct">${((p.done+p.curr)/p.total*100).toFixed(0)}%</span>
  </div>`).join("");
</script>
</body>
</html>
